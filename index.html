<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>José & Ana | Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Montserrat',sans-serif;
background:#f8f4ec;
color:#2f2f2f;
overflow-x:hidden;
}

/* HERO */

.hero{
position:relative;
width:100%;
height:100vh;
min-height:760px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
color:white;
}

.hero-photo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center 38%;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.35));
}

.hero-inner{
position:relative;
z-index:2;
margin-top:55px;
padding:20px;
width:100%;
}

.top-text{
font-size:13px;
letter-spacing:5px;
text-transform:uppercase;
margin-bottom:12px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:110px;
font-weight:500;
line-height:.9;
margin-bottom:8px;
}

.date{
font-size:28px;
letter-spacing:2px;
font-weight:300;
}

/* COUNTDOWN */

.countdown-section{
padding:70px 20px;
text-align:center;
}

.countdown-title{
font-family:'Cormorant Garamond',serif;
font-size:56px;
margin-bottom:28px;
}

.countdown{
display:flex;
justify-content:center;
align-items:center;
gap:18px;
flex-wrap:wrap;
max-width:900px;
margin:0 auto;
}

.box{
background:white;
padding:22px 24px;
border-radius:18px;
min-width:120px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.num{
font-size:44px;
font-weight:600;
line-height:1;
}

.label{
font-size:12px;
letter-spacing:3px;
text-transform:uppercase;
margin-top:8px;
opacity:.6;
}

/* CONTENT */

section{
padding:90px 24px;
max-width:1000px;
margin:auto;
text-align:center;
}

h2{
font-family:'Cormorant Garamond',serif;
font-size:54px;
margin-bottom:18px;
}

p{
font-size:18px;
line-height:1.9;
max-width:760px;
margin:auto;
}

.card{
background:white;
padding:55px 35px;
border-radius:24px;
box-shadow:0 14px 35px rgba(0,0,0,.06);
}

.footer{
padding:55px 20px;
text-align:center;
font-size:14px;
opacity:.65;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TABLET */

@media(max-width:1000px){

.hero-inner{
margin-top:-150px;
}

h1{
font-size:78px;
}

.date{
font-size:22px;
}

.box{
min-width:100px;
}

}

/* MOBILE */

@media(max-width:700px){

.hero{
height:88vh;
min-height:620px;
background-position:center center;
padding:40px 18px;
}

.hero-inner{
margin-top:-90px;
}

.top-text{
font-size:11px;
letter-spacing:4px;
}

h1{
font-size:54px;
line-height:1;
}

.date{
font-size:18px;
line-height:1.5;
}

.countdown-title{
font-size:40px;
}

.countdown{
gap:12px;
}

.box{
min-width:78px;
padding:16px 12px;
}

.num{
font-size:28px;
}

h2{
font-size:40px;
}

p{
font-size:16px;
}

}
</style>
</head>

<body>

<section class="hero">

<img src="foto-casal.jpg" class="hero-photo">

<div class="overlay"></div>

<div class="hero-inner">
<div class="top-text">Save the Date</div>
<h1>José & Ana</h1>
<div class="date">11 de Junho de 2027 · Guimarães</div>
</div>

</section>

<section class="countdown-section">

<div class="countdown-title">Falta pouco</div>

<div class="countdown">

<div class="box">
<div class="num" id="days">0</div>
<div class="label">Dias</div>
</div>

<div class="box">
<div class="num" id="hours">0</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="num" id="minutes">0</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="num" id="seconds">0</div>
<div class="label">Seg</div>
</div>

</div>

</section>

<section>

<h2>Um dia inesquecível</h2>

<p>
Estamos ansiosos por celebrar este momento especial convosco.
Reservem esta data e juntem-se a nós neste dia único.
</p>

</section>

<div class="footer">
José & Ana · 2027
</div>

<script>
const targetDate = new Date("June 11, 2027 00:00:00").getTime();

function updateCountdown(){
const now = new Date().getTime();
const diff = targetDate - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
const seconds = Math.floor((diff % (1000*60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
